name: Release

on:
  push:
    tags:
      - 'v*-hackathon'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Run tests
        run: python3 -m pytest tests/ -x -q

      - name: Generate SBOM — SPDX
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Generate SBOM — CycloneDX
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOMs (keyless via GitHub OIDC)
        run: |
          cosign sign-blob --yes sbom.spdx.json --bundle sbom.spdx.json.bundle
          cosign sign-blob --yes sbom.cyclonedx.json --bundle sbom.cyclonedx.json.bundle

      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            sbom.spdx.json
            sbom.cyclonedx.json

      - name: Create GitHub Release and attach artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "SIFTGuard ${{ github.ref_name }}" \
            --notes-file docs/RELEASE_NOTES.md \
            sbom.spdx.json \
            sbom.cyclonedx.json \
            sbom.spdx.json.bundle \
            sbom.cyclonedx.json.bundle
